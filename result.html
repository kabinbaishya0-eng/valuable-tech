<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Valuable Tech | IT, Security & Electrical Solutions | HSLC Result 2026</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2300f2ff'><path d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --dark-bg: #030712; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            position: relative; 
            overflow: hidden; 
        }
        .hero-glow { 
            position: absolute; 
            top: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            height: 600px; 
            background: radial-gradient(circle at 50% 0%, rgba(0, 242, 255, 0.15) 0%, transparent 70%); 
            z-index: -1; 
        }
        .neon-card { 
            position: relative; 
            z-index: 0; 
            overflow: hidden; 
            border-radius: 32px; 
            padding: 2px; 
            width: 100%; 
            max-width: 420px; 
            animation: neon-pulse 3s ease-in-out infinite alternate; 
        }
        @keyframes neon-pulse { 
            from { box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); } 
            to { box-shadow: 0 0 25px rgba(0, 242, 255, 0.6); } 
        }
        .neon-card::before { 
            content: ''; 
            position: absolute; 
            z-index: -1; 
            top: -50%; 
            left: -50%; 
            width: 200%; 
            height: 200%; 
            background: conic-gradient(transparent, #00f2ff, transparent, #00f2ff, transparent); 
            animation: rotate-border 10s linear infinite; 
        }
        @keyframes rotate-border { 100% { transform: rotate(360deg); } }
        .card-inner { 
            background: #030712; 
            border-radius: 30px; 
            padding: 3rem; 
            width: 100%; 
            height: 100%; 
        }
        .input-style { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            transition: all 0.3s ease; 
        }
        .input-style:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); 
        }
    </style>
</head>
<body class="antialiased">
    <div class="hero-glow"></div>
    <div class="neon-card">
        <div class="card-inner text-center">
            
            <div class="flex items-center justify-center space-x-2 mb-10">
                <div class="w-9 h-9 bg-cyan-500 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(6,182,212,0.5)]">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <span class="font-extrabold text-xl tracking-tighter uppercase italic text-white">Valuable<span class="text-cyan-400">Tech Support</span></span>
            </div>

            <h1 class="text-sm font-bold mb-8 text-gray-500 tracking-[0.3em] uppercase">HSLC Result Portal</h1>

            <form action="https://result.assamresult.in/result666.php" method="GET" class="text-left">
                <input type="hidden" name="radio" value="B26">
                
                <div class="mb-6">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-600 mb-2 ml-1">Center Number</label>
                    <input type="text" name="center_num" placeholder="e.g. 0937" required autofocus autocomplete="off"
                           class="input-style w-full px-5 py-4 rounded-xl font-bold text-white">
                </div>

                <div class="mb-8">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-gray-600 mb-2 ml-1">Roll Number</label>
                    <input type="text" name="rollno" placeholder="e.g. 0009" required autocomplete="off"
                           class="input-style w-full px-5 py-4 rounded-xl font-bold text-white">
                </div>

                <button type="submit" name="search" value="Check Result" 
                        class="w-full bg-cyan-500 text-black py-5 rounded-xl font-black text-sm uppercase tracking-widest hover:bg-white transition-all shadow-[0_15px_30px_rgba(0, 242, 255, 0.3)]">
                    Show Marksheet
                </button>
            </form>

            <div class="mt-10">
                <a href="index.html" class="text-gray-700 text-[10px] font-bold uppercase tracking-widest hover:text-cyan-400 transition flex items-center justify-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Back to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
