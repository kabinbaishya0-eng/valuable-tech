<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHSEC Result 2026 | Valuable Tech Support</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23ff9d00'><path d='M13 10V3L4 14h7v7l9-11h-7z'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --latest: #ff9d00; --dark-bg: #030712; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--dark-bg); 
            color: #ffffff; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
            overflow: hidden;
        }
        .hero-glow { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle at 50% 50%, rgba(255, 157, 0, 0.1) 0%, transparent 70%); 
            z-index: -1; 
        }
        .message-card {
            text-align: center;
            padding: 3rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 157, 0, 0.2);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="antialiased">
    <div class="hero-glow"></div>

    <div class="message-card">
        <div class="w-16 h-16 bg-orange-500/10 text-orange-500 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-[0_0_30px_rgba(255,157,0,0.2)]">
            <svg class="w-10 h-10 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">

        </div>

        <p class="text-orange-400 font-bold uppercase tracking-widest text-xs mb-8 bg-orange-400/10 py-2 px-4 rounded-full inline-block">

        </p>
        
        <p class="text-gray-500 text-sm leading-relaxed mb-10">

            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
